name: Sync AI Folder to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - "ai/**"

  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: Tutel314/ai-schedule-helper
          hf_token: ${{ secrets.HF_TOKEN }}

          subdirectory: ai

          repo_type: space
          space_sdk: docker