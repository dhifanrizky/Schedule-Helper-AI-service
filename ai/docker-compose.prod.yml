services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - ENVIRONMENT=production
    depends_on:
      redis:
        condition: service_healthy
    restart: alwa

  redis:
    image: redis/redis-stack:7.2.0-v10 
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/da
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  redis_data: